name: Deploy to Production

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    name: Build and Deploy to Cloudflare Pages (Production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          # Production API URLs — points to your production backend on DigitalOcean
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VITE_LOGIN_API: ${{ secrets.PRODUCTION_LOGIN_API }}
          VITE_SOCKET_URL: ${{ secrets.PRODUCTION_SOCKET_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          # Cloudflare credentials
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The name of your Cloudflare Pages project
          projectName: mfon-obong-frontend
          # The folder containing the built React app
          directory: dist
          # Deploying to production branch maps to your custom domain:
          # mfonobongenterprise.com
          branch: production
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
