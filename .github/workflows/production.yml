name: Deploy to Production

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    name: Build and Deploy to Cloudflare Pages (Production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          # Production API URLs — points to your production backend on DigitalOcean
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VITE_LOGIN_API: ${{ secrets.PRODUCTION_LOGIN_API }}
          VITE_SOCKET_URL: ${{ secrets.PRODUCTION_SOCKET_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=mfon-obong-frontend --branch=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
