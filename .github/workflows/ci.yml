name: CI

on:
  push:
    branches-ignore:
      - staging
      - production
  pull_request:
    branches:
      - main
      - staging
      - production

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build application
        run: npm run build
        env:
          # Placeholder values for CI checks on feature branches
          # Real values are injected during staging/production deployments
          VITE_API_URL: https://placeholder.example.com/api
          VITE_LOGIN_API: https://placeholder.example.com/api/auth
          VITE_SOCKET_URL: https://placeholder.example.com

      - name: Verify build output
        run: |
          if [ -d "dist" ]; then
            echo "Build successful — dist/ folder created"
            ls -la dist/
          else
            echo "Build failed — dist/ folder not found"
            exit 1
          fi
