server {
    listen 80;
    server_name _;

    # The folder where our compiled React app lives
    root /usr/share/nginx/html;
    index index.html;

    # React Router fix — Single Page Application (SPA) support
    # When a user refreshes the page on a route like /dashboard,
    # Nginx looks for a file at /dashboard and finds nothing (404).
    # This rule tells Nginx: "if the file doesn't exist, serve index.html instead"
    # React Router then takes over and renders the correct page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    # JS, CSS, and image files have hashed filenames (e.g. main.a1b2c3.js)
    # so they change name when content changes — safe to cache for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Enable Gzip compression
    # Compresses text files before sending them to the browser,
    # reducing page load time significantly
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;
}
